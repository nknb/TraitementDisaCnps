# ============================================================
# CNPS - Configuration base de données partagée
# ============================================================
#
# Pour activer le travail multi-utilisateurs simultané :
#
#   1. Copiez le fichier disa.db dans un dossier partagé réseau
#      accessible en lecture/écriture à tous les agents.
#
#   2. Renseignez ci-dessous le chemin complet vers ce fichier.
#      Exemples :
#        Windows réseau  : DB_PATH=\\SERVEUR\Partages\CNPS\disa.db
#        Dossier local   : DB_PATH=C:\CNPS\data\disa.db
#        macOS/Linux     : DB_PATH=/Volumes/Partage/CNPS/disa.db
#
#   3. Placez ce fichier disa.conf dans le même dossier que
#      l'exécutable sur CHAQUE poste de travail.
#
#   4. Assurez-vous que le dossier réseau reste accessible
#      (connexion réseau active) avant d'ouvrir l'application.
#
# Si DB_PATH est vide ou ce fichier absent, l'application utilise
# la base locale : data/disa.db (mode mono-poste).
# ============================================================

DB_PATH=
